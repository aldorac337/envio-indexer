# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: envio-indexer
unordered_multichain_mode: true # When true, strict cross chain ordering of event processing will not be obeyed.
rollback_on_reorg: false
# field_selection: # Additional fields available to index to augment data
#   transaction_fields:
#     - "hash"
#     - "from"
contracts:
  - name: AavePool
    handler: src/EventHandlers.ts
    events:
      - event: BackUnbacked(address indexed reserve, address indexed backer, uint256 amount, uint256 fee)
      - event: Borrow(address indexed reserve, address user, address indexed onBehalfOf, uint256 amount, uint8 interestRateMode, uint256 borrowRate, uint16 indexed referralCode)
      - event: DeficitCovered(address indexed reserve, address caller, uint256 amountCovered)
      - event: DeficitCreated(address indexed user, address indexed debtAsset, uint256 amountCreated)
      - event: FlashLoan(address indexed target, address initiator, address indexed asset, uint256 amount, uint8 interestRateMode, uint256 premium, uint16 indexed referralCode)
      # Temporarily commented out due to PostgreSQL enum label length limit
      # - event: IsolationModeTotalDebtUpdated(address indexed asset, uint256 totalDebt)
      - event: LiquidationCall(address indexed collateralAsset, address indexed debtAsset, address indexed user, uint256 debtToCover, uint256 liquidatedCollateralAmount, address liquidator, bool receiveAToken)
      - event: MintUnbacked(address indexed reserve, address user, address indexed onBehalfOf, uint256 amount, uint16 indexed referralCode)
      - event: MintedToTreasury(address indexed reserve, uint256 amountMinted)
      - event: Repay(address indexed reserve, address indexed user, address indexed repayer, uint256 amount, bool useATokens)
      - event: ReserveDataUpdated(address indexed reserve, uint256 liquidityRate, uint256 stableBorrowRate, uint256 variableBorrowRate, uint256 liquidityIndex, uint256 variableBorrowIndex)
      - event: ReserveUsedAsCollateralDisabled(address indexed reserve, address indexed user)
      - event: ReserveUsedAsCollateralEnabled(address indexed reserve, address indexed user)
      - event: Supply(address indexed reserve, address user, address indexed onBehalfOf, uint256 amount, uint16 indexed referralCode)
      - event: Upgraded(address indexed implementation)
      - event: UserEModeSet(address indexed user, uint8 categoryId)
      - event: Withdraw(address indexed reserve, address indexed user, address indexed to, uint256 amount)

  - name: AaveOracle
    handler: src/EventHandlers.ts
    events:
      - event: AssetSourceUpdated(address indexed asset, address indexed source)
      - event: BaseCurrencySet(address indexed baseCurrency, uint256 baseCurrencyUnit)
      - event: FallbackOracleUpdated(address indexed fallbackOracle)
      - event: Upgraded(address indexed implementation)

  - name: GHOFlashMinter
    handler: src/EventHandlers.ts
    events:
      - event: FlashMint(address indexed receiver, uint256 amount, uint256 fee)

  - name: PoolConfigurator
    handler: src/EventHandlers.ts
    events:
      - event: ATokenUpgraded(address indexed asset, address indexed proxy, address indexed implementation)
      - event: BorrowCapChanged(address indexed asset, uint256 oldBorrowCap, uint256 newBorrowCap)
      - event: BorrowableInIsolationChanged(address asset, bool borrowable)
      - event: BridgeProtocolFeeUpdated(uint256 oldBridgeProtocolFee, uint256 newBridgeProtocolFee)
      - event: CollateralConfigurationChanged(address indexed asset, uint256 ltv, uint256 liquidationThreshold, uint256 liquidationBonus)
      - event: DebtCeilingChanged(address indexed asset, uint256 oldDebtCeiling, uint256 newDebtCeiling)
      - event: ReserveActive(address indexed asset, bool active)
      - event: ReserveBorrowing(address indexed asset, bool enabled)
      - event: ReserveDropped(address indexed asset)
      - event: ReserveFactorChanged(address indexed asset, uint256 oldReserveFactor, uint256 newReserveFactor)
      - event: ReserveFrozen(address indexed asset, bool frozen)
      - event: ReserveInitialized(address indexed asset, address indexed aToken, address stableDebtToken, address variableDebtToken, address interestRateStrategyAddress)
      - event: ReserveInterestRateStrategyChanged(address indexed asset, address oldStrategy, address newStrategy)
      - event: ReservePaused(address indexed asset, bool paused)
      - event: ReserveStableRateBorrowing(address indexed asset, bool enabled)
      - event: SiloedBorrowingChanged(address indexed asset, bool oldState, bool newState)
      - event: StableDebtTokenUpgraded(address indexed asset, address indexed proxy, address indexed implementation)
      - event: SupplyCapChanged(address indexed asset, uint256 oldSupplyCap, uint256 newSupplyCap)
      - event: UnbackedMintCapChanged(address indexed asset, uint256 oldUnbackedMintCap, uint256 newUnbackedMintCap)
      - event: Upgraded(address indexed implementation)
      - event: VariableDebtTokenUpgraded(address indexed asset, address indexed proxy, address indexed implementation)

  - name: AaveMerkleDistributor
    handler: src/EventHandlers.ts
    events:
      - event: Claimed(address indexed user, address indexed token, uint256 amount)
      - event: MerkleRootUpdated(bytes32 indexed merkleRoot)
      - event: MerkleRootProposed(bytes32 indexed merkleRoot, uint256 indexed epoch)

  - name: EmissionManager
    handler: src/EventHandlers.ts
    events:
      - event: EmissionAdminUpdated(address indexed reward, address indexed oldAdmin, address indexed newAdmin)
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)
      - event: Upgraded(address indexed implementation)

  - name: ManualAGRS
    handler: src/EventHandlers.ts
    events:
      - event: AdminChanged(address previousAdmin, address newAdmin)
      - event: Upgraded(address indexed implementation)

  - name: PoolAddressesProvider
    handler: src/EventHandlers.ts
    events:
      - event: ACLAdminUpdated(address indexed oldAddress, address indexed newAddress)
      - event: ACLManagerUpdated(address indexed oldAddress, address indexed newAddress)
      - event: AddressSet(bytes32 indexed id, address indexed oldAddress, address indexed newAddress)
      - event: AddressSetAsProxy(bytes32 indexed id, address indexed proxyAddress, address oldImplementationAddress, address indexed newImplementationAddress)
      - event: MarketIdSet(string indexed oldMarketId, string indexed newMarketId)
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)
      - event: PoolConfiguratorUpdated(address indexed oldAddress, address indexed newAddress)
      - event: PoolDataProviderUpdated(address indexed oldAddress, address indexed newAddress)
      - event: PoolUpdated(address indexed oldAddress, address indexed newAddress)
      - event: PriceOracleSentinelUpdated(address indexed oldAddress, address indexed newAddress)
      - event: PriceOracleUpdated(address indexed oldAddress, address indexed newAddress)
      - event: ProxyCreated(bytes32 indexed id, address indexed proxyAddress, address indexed implementationAddress)
      - event: Upgraded(address indexed implementation)

  - name: PoolAddressesProviderRegistry
    handler: src/EventHandlers.ts
    events:
      - event: AddressesProviderRegistered(address indexed newAddress)
      - event: AddressesProviderUnregistered(address indexed newAddress)
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)

  - name: ProxyAdmin
    handler: src/EventHandlers.ts
    events:
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)

  - name: ProxyAdminLong
    handler: src/EventHandlers.ts
    events:
      - event: OwnershipTransferred(address indexed previousOwner, address indexed newOwner)

  - name: AavePolEthBridge
    handler: src/EventHandlers.ts
    events:
      - event: Bridge(address indexed token, uint256 amount)
      - event: ERC20Rescued(address indexed token, address indexed to, uint256 amount)
      - event: EthereumGovernanceExecutorUpdated(address indexed newEthereumGovernanceExecutor)
      - event: FxChildUpdated(address indexed newFxChild)
      - event: FxRootUpdated(address indexed newFxRoot)

  - name: ACLManager
    handler: src/EventHandlers.ts
    events:
      - event: RoleAdminChanged(bytes32 indexed role, bytes32 indexed previousAdminRole, bytes32 indexed newAdminRole)
      - event: RoleGranted(bytes32 indexed role, address indexed account, address indexed sender)
      - event: RoleRevoked(bytes32 indexed role, address indexed account, address indexed sender)

  - name: WrappedTokenGatewayV3
    handler: src/EventHandlers.ts
    events:
      - event: EmergencyTokenTransfer(address indexed token, address indexed to, uint256 amount)
      - event: EmergencyEtherTransfer(address indexed to, uint256 amount)

  - name: ParaSwapRepayAdapter
    handler: src/EventHandlers.ts
    events:
      - event: Swapped(address indexed fromAsset, address indexed toAsset, uint256 fromAmount, uint256 receivedAmount)
      - event: Bought(address indexed fromAsset, address indexed toAsset, uint256 amountSold, uint256 receivedAmount)

  - name: ParaSwapLiquiditySwapAdapter
    handler: src/EventHandlers.ts
    events:
      - event: Swapped(address indexed fromAsset, address indexed toAsset, uint256 fromAmount, uint256 receivedAmount)
      - event: Bought(address indexed fromAsset, address indexed toAsset, uint256 amountSold, uint256 receivedAmount)

  - name: FreezeSteward
    handler: src/EventHandlers.ts
    events:
      - event: ReserveFrozen(address indexed asset, bool frozen)

  - name: Collector
    handler: src/EventHandlers.ts
    events:
      - event: AdminChanged(address previousAdmin, address newAdmin)
      - event: Upgraded(address indexed implementation)
      - event: ETHTransferred(address indexed to, uint256 amount)
      - event: ERC20Transferred(address indexed token, address indexed to, uint256 amount)
      - event: FundsAdminChanged(address indexed newFundsAdmin)
      - event: NewRewardsVault(address indexed newRewardsVault)

  - name: CapPlusRiskSteward
    handler: src/EventHandlers.ts
    events:
      - event: RiskParamsUpdated(address indexed asset, uint256 ltv, uint256 liquidationThreshold, uint256 liquidationBonus)
      - event: CapsUpdated(address indexed asset, uint256 supplyCap, uint256 borrowCap)

  - name: RewardsController
    handler: src/EventHandlers.ts
    events:
      - event: Upgraded(address indexed implementation)
      - event: Accrued(address indexed asset, address indexed reward, address indexed user, uint256 assetIndex, uint256 userIndex, uint256 rewardsAccrued)
      - event: AssetConfigUpdated(address indexed asset, address indexed reward, uint256 oldEmission, uint256 newEmission, uint256 oldDistributionEnd, uint256 newDistributionEnd, uint256 assetIndex)
      - event: ClaimerSet(address indexed user, address indexed claimer)
      - event: RewardsClaimed(address indexed user, address indexed to, address indexed claimer, uint256 amount)
      - event: RewardsAccrued(address indexed user, uint256 amount)
      - event: TransferStrategyInstalled(address indexed reward, address indexed transferStrategy)
      - event: RewardOracleUpdated(address indexed reward, address indexed rewardOracle)

